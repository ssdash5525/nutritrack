<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTrack — Create Account</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="auth-page">

  <button class="btn-icon auth-theme-btn" id="theme-toggle" title="Toggle theme">☾</button>

  <div class="auth-card">
    <div class="auth-logo">Nutri<span>Track</span></div>
    <p class="auth-subtitle">Create your account to get started</p>

    <div class="auth-error" id="auth-error"></div>

    <form id="form-signup" novalidate>
      <div class="form-group">
        <label for="input-name">Your Name</label>
        <input type="text" id="input-name" placeholder="Jane Smith" autocomplete="name" maxlength="60" />
      </div>

      <div class="form-group">
        <label for="input-email">Email *</label>
        <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="input-password">Password * <span class="text-muted text-sm">(min 8 characters)</span></label>
        <div class="password-wrapper">
          <input type="password" id="input-password" placeholder="••••••••" autocomplete="new-password" required minlength="8" />
          <button type="button" class="password-toggle" id="pw-toggle" tabindex="-1" title="Show/hide password">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="input-confirm">Confirm Password *</label>
        <div class="password-wrapper">
          <input type="password" id="input-confirm" placeholder="••••••••" autocomplete="new-password" required />
          <button type="button" class="password-toggle" id="confirm-toggle" tabindex="-1" title="Show/hide password">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="btn-signup" style="margin-top:0.5rem">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script>
    FirebaseAuth.requireGuest('index.html');

    const errorEl = document.getElementById('auth-error');
    function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); }
    function clearError()   { errorEl.classList.remove('show'); }

    document.getElementById('pw-toggle').addEventListener('click', () => {
      const input = document.getElementById('input-password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('confirm-toggle').addEventListener('click', () => {
      const input = document.getElementById('input-confirm');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('form-signup').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const name     = document.getElementById('input-name').value.trim();
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;
      const confirm  = document.getElementById('input-confirm').value;
      const btn      = document.getElementById('btn-signup');

      // Validate
      if (!email)              { showError('Email is required.'); return; }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (password !== confirm) { showError('Passwords do not match.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        await FirebaseAuth.signUp(email, password, name);
        window.location.href = 'index.html';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Create Account';
        showError(friendlyError(err.code));
      }
    });

    function friendlyError(code) {
      const map = {
        'auth/email-already-in-use': 'An account with this email already exists. Try signing in.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/weak-password':        'Password is too weak — use at least 8 characters.',
        'auth/network-request-failed': 'Network error — check your connection.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>
</body>
</html>
